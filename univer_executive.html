<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SovereignGrid • Open Source Local Spreadsheet</title>
    <!-- Google Fonts & Tailwind -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- UniverJS Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/design@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/ui@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-ui@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-numfmt@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-find-replace@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/docs-ui@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-conditional-formatting@0.2.0/lib/index.css">

    <style>
        :root {
            --bg-color: #131417;
            --panel-color: #1b1c1f;
            --border-color: #2e3037;
            --text-color: #e3e4e6;
            --text-muted: #8a8d98;
            --accent-color: #0DA471;
            --accent-glow: rgba(13, 164, 113, 0.15);
            --danger-color: #ff003c;
            --warning-color: #ffb700;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Sovereign theme overrides for Univer */
        .univer-workbench {
            background-color: var(--panel-color) !important;
            border-color: var(--border-color) !important;
        }
    </style>
</head>
<body class="bg-[#131417] text-[#e3e4e6]">

    <!-- Header Navbar -->
    <header class="bg-[#1b1c1f] border-b border-[#2e3037] h-[55px] flex items-center justify-between px-5 z-40">
        <div class="flex items-center gap-2">
            <button onclick="toggleSidebar()" class="text-lg hover:text-[#0DA471] transition-all p-1.5 rounded-lg border border-[#2e3037] mr-1" title="Toggle Sidebar">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="w-2.5 h-2.5 rounded-full bg-[#0DA471] shadow-[0_0_8px_#0DA471]"></div>
            <span class="font-semibold text-sm tracking-wide" id="title-text">SovereignGrid</span>
            <span class="text-[9px] text-[#8a8d98] border border-[#2e3037] px-2 py-0.5 rounded-xl uppercase font-medium" id="badge-mode">LOCAL ENCLAVE</span>
        </div>

        <div class="flex items-center gap-3">
            <!-- DuckDB SQL OLAP Input -->
            <div class="flex items-center bg-[#131417] border border-[#2e3037] rounded-lg px-2 py-1">
                <span class="font-mono text-xs text-[#0DA471] font-bold mr-1">SQL></span>
                <input type="text" id="sql-query-val" class="bg-transparent border-none text-[#e3e4e6] font-mono text-[11px] w-[260px] outline-none" value="SELECT category, SUM(price) FROM inventory_items GROUP BY category" />
                <button class="text-xs text-[#0DA471] hover:text-[#10cf8e] font-semibold px-2" onclick="runSqlOlap()" id="sql-run-btn">Run Query</button>
            </div>

            <button class="bg-[#0DA471] text-[#131417] hover:bg-[#10cf8e] hover:shadow-[0_0_10px_rgba(13,164,113,0.25)] transition-all font-semibold text-xs px-3 py-1.5 rounded-lg" onclick="triggerRecalculate()" id="btn-recalc">Run C++20 Atomics</button>
            <button class="bg-[#25272d] border border-[#2e3037] hover:border-[#0DA471] hover:text-[#0DA471] text-[#e3e4e6] transition-all text-xs px-3 py-1.5 rounded-lg" onclick="directPrint()" id="btn-print">Print GIAI Tag</button>
            
            <div class="w-px h-4 bg-[#2e3037]"></div>
            
            <button class="bg-[#25272d] border border-[#2e3037] hover:border-[#0DA471] hover:text-[#0DA471] text-[#e3e4e6] transition-all text-xs px-2.5 py-1.5 rounded-lg" onclick="exportData('csv')">CSV</button>
            <button class="bg-[#25272d] border border-[#2e3037] hover:border-[#0DA471] hover:text-[#0DA471] text-[#e3e4e6] transition-all text-xs px-2.5 py-1.5 rounded-lg" onclick="exportData('json')">JSON</button>
            <button class="bg-[#25272d] border border-[#2e3037] hover:text-[#0DA471] text-[#e3e4e6] text-xs px-3 py-1.5 rounded-lg hover:border-[#0DA471]" onclick="toggleLanguage()" id="btn-lang">عربي</button>
        </div>
    </header>

    <!-- Workspace -->
    <div class="workspace flex flex-1 min-h-0 relative">
        <!-- Collapsible Left Sidebar -->
        <div id="sidebar-container" class="w-[260px] bg-[#1b1c1f] border-r border-[#2e3037] flex flex-col p-5 gap-5 overflow-y-auto z-30 transition-all duration-300">
            <!-- Sidebar Header -->
            <div class="flex items-center justify-between border-b border-[#2e3037] pb-3">
                <span class="text-xs font-bold uppercase tracking-wider text-[#8a8d98]" id="sidebar-header-text">Spreadsheet Controls</span>
                <button onclick="toggleSidebar()" class="text-[#8a8d98] hover:text-white transition-colors" title="Collapse Sidebar">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            </div>

            <!-- Numbered Organized Mathematical Tables Presets -->
            <div class="flex flex-col gap-3">
                <span class="text-[11px] font-bold text-[#0DA471] uppercase tracking-wider" id="presets-title">Mathematical Grids</span>
                
                <button onclick="loadPreset(1)" class="w-full bg-[#25272d] border border-[#2e3037] text-left hover:border-[#0DA471] hover:bg-neutral-800 text-xs px-3 py-2.5 rounded-lg flex items-center gap-3 transition-all">
                    <span class="w-5 h-5 rounded-md bg-[#0DA471]/15 text-[#0DA471] font-bold flex items-center justify-center font-mono">1</span>
                    <span id="preset1-lbl">Financial Model Template</span>
                </button>

                <button onclick="loadPreset(2)" class="w-full bg-[#25272d] border border-[#2e3037] text-left hover:border-[#0DA471] hover:bg-neutral-800 text-xs px-3 py-2.5 rounded-lg flex items-center gap-3 transition-all">
                    <span class="w-5 h-5 rounded-md bg-[#0DA471]/15 text-[#0DA471] font-bold flex items-center justify-center font-mono">2</span>
                    <span id="preset2-lbl">Atomics Cascading Stress</span>
                </button>

                <button onclick="loadPreset(3)" class="w-full bg-[#25272d] border border-[#2e3037] text-left hover:border-[#0DA471] hover:bg-neutral-800 text-xs px-3 py-2.5 rounded-lg flex items-center gap-3 transition-all">
                    <span class="w-5 h-5 rounded-md bg-[#0DA471]/15 text-[#0DA471] font-bold flex items-center justify-center font-mono">3</span>
                    <span id="preset3-lbl">Array Vector Multiplier</span>
                </button>

                <button onclick="loadPreset(4)" class="w-full bg-[#25272d] border border-[#2e3037] text-left hover:border-[#0DA471] hover:bg-neutral-800 text-xs px-3 py-2.5 rounded-lg flex items-center gap-3 transition-all">
                    <span class="w-5 h-5 rounded-md bg-[#0DA471]/15 text-[#0DA471] font-bold flex items-center justify-center font-mono">4</span>
                    <span id="preset4-lbl">Nested-IF refactoring</span>
                </button>
            </div>

            <!-- local utilities -->
            <div class="flex flex-col gap-3 mt-4">
                <span class="text-[11px] font-bold text-[#8a8d98] uppercase tracking-wider" id="utils-title">Storage & Logging</span>
                <div class="bg-[#131417] border border-[#2e3037] rounded-lg p-3 text-xs space-y-2">
                    <div class="flex justify-between">
                        <span class="text-[#8a8d98]">Auto-save:</span>
                        <span class="text-[#0DA471]" id="save-status">Active (15s)</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-[#8a8d98]">Engine:</span>
                        <span class="font-mono">C++20/Atomics</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sheet Grid Container -->
        <div class="flex-1 min-w-0 relative">
            <div id="univer-container"></div>
        </div>

        <!-- SQL OLAP modal popup -->
        <div id="olap-modal" class="hidden flex-col absolute bottom-10 right-5 w-[480px] max-h-[300px] bg-[#1b1c1f] border border-[#2e3037] rounded-xl shadow-[0_10px_25px_rgba(0,0,0,0.5)] z-50 overflow-hidden">
            <div class="flex justify-between items-center px-4 py-2 border-b border-[#2e3037] bg-[#16171a]">
                <span class="text-[11px] font-semibold text-[#0DA471]" id="modal-title">DuckDB Columnar Query Results</span>
                <button onclick="closeModal()" class="text-[#8a8d98] hover:text-white text-lg font-bold">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto font-mono text-[11px] text-[#b5b7c0] flex-1" id="modal-body-content">
                No query executed.
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-[#1b1c1f] border-t border-[#2e3037] h-[28px] flex items-center justify-between px-5 text-xs">
        <div id="footer-left">SovereignGrid • Open-Source Offline Engine</div>
        <div id="evaluation-latency" style="color: var(--accent-color)">Puncalc Atomics: 0.00ms</div>
        <div id="footer-right">100,000+ Row Canvas2D Grid</div>
    </footer>

    <!-- UniverJS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/core@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/design@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/engine-render@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/engine-formula@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/ui@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/docs@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/docs-ui@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-ui@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-formula@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-numfmt@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-find-replace@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-conditional-formatting@0.2.0/lib/umd/index.js"></script>

    <script>
        let bridge;
        try {
            if (window.chrome && window.chrome.webview && window.chrome.webview.hostObjects) {
                bridge = window.chrome.webview.hostObjects.bridge;
            }
        } catch (e) {
            console.warn("WebView2 Host Object Bridge not available. Emulating offline.", e);
        }

        // Configure default theme and override colors to match accent green
        const defaultTheme = UniverDesign.themes.dark;
        defaultTheme.green500 = '#0DA471';
        defaultTheme.primaryColor = '#0DA471';
        defaultTheme.bgNormalColor = '#1B1C1F';
        defaultTheme.bgBodyColor = '#1B1C1F';

        // 1. Initialize UniverJS core engine
        const univer = new UniverCore.Univer({
            theme: defaultTheme,
            darkMode: true
        });

        // Register core & UI plugins
        univer.registerPlugin(UniverRender.UniverRenderEnginePlugin);
        univer.registerPlugin(UniverUI.UniverUIPlugin, {
            container: 'univer-container',
            header: true,
            footer: true,
            sidebar: false,
        });
        univer.registerPlugin(UniverDocs.UniverDocsPlugin);
        univer.registerPlugin(UniverDocsUI.UniverDocsUIPlugin);
        univer.registerPlugin(UniverSheets.UniverSheetsPlugin);
        univer.registerPlugin(UniverSheetsUI.UniverSheetsUIPlugin);
        univer.registerPlugin(UniverSheetsFormula.UniverSheetsFormulaPlugin);
        univer.registerPlugin(UniverSheetsNumfmt.UniverSheetsNumfmtPlugin);
        univer.registerPlugin(UniverSheetsFindReplace.UniverSheetsFindReplacePlugin);
        univer.registerPlugin(UniverSheetsConditionalFormatting.UniverSheetsConditionalFormattingPlugin);

        // Load cached spreadsheet data from localStorage if exists
        let loadedCellData = null;
        try {
            const cached = localStorage.getItem('sovereign_grid_cells');
            if (cached) loadedCellData = JSON.parse(cached);
        } catch (err) {}

        const defaultCellData = {
            '0': {
                '0': { v: 'Column A (Raw Values)' },
                '1': { v: 'Column B (Calculations)' },
                '2': { v: 'Column C (Conditionals)' }
            },
            '1': {
                '0': { v: 1500 },
                '1': { v: '=SUM(A2:A5)' },
                '2': { v: '=IFS(A2>2000, "High", A2>1000, "Medium", true, "Low")' }
            },
            '2': { '0': { v: 2200 } },
            '3': { '0': { v: 950 } },
            '4': { '0': { v: 1300 } }
        };

        // Create workbook instance
        const workbook = univer.createUniverSheet({
            id: 'sovereign_workbook',
            name: 'Sheet1',
            sheetOrder: ['sheet1'],
            sheets: {
                sheet1: {
                    id: 'sheet1',
                    name: 'Grid Data',
                    rowCount: 100000,
                    columnCount: 26,
                    cellData: loadedCellData || defaultCellData
                }
            }
        });

        // Auto-save logic (Local Storage)
        setInterval(() => {
            try {
                const snapshot = workbook.save();
                if (snapshot && snapshot.sheets && snapshot.sheets.sheet1 && snapshot.sheets.sheet1.cellData) {
                    localStorage.setItem('sovereign_grid_cells', JSON.stringify(snapshot.sheets.sheet1.cellData));
                }
            } catch (err) {}
        }, 15000);

        // Sidebar Collapse/Expand Toggle
        let isSidebarOpen = true;
        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            const sidebar = document.getElementById('sidebar-container');
            if (isSidebarOpen) {
                sidebar.classList.remove('hidden');
                sidebar.style.width = '260px';
            } else {
                sidebar.classList.add('hidden');
                sidebar.style.width = '0px';
            }
            // Trigger UniverJS canvas bounds recalculation on resize
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 100);
        }

        // Load Numbered Preset Mathematical Tables
        function loadPreset(id) {
            const sheet = workbook.getActiveSheet();
            
            // Clear first 25 rows and 6 columns to prepare clean grid
            for (let r = 0; r < 25; r++) {
                for (let c = 0; c < 6; c++) {
                    sheet.getRange(r, c).setValue("");
                }
            }

            if (id === 1) {
                // Financial Model Template
                sheet.getRange(0, 0).setValue("Asset Type");
                sheet.getRange(0, 1).setValue("Initial Cost");
                sheet.getRange(0, 2).setValue("Disposal Value");
                sheet.getRange(0, 3).setValue("Net Depreciated Value");
                
                sheet.getRange(1, 0).setValue("Hardware");
                sheet.getRange(1, 1).setValue(25000);
                sheet.getRange(1, 2).setValue(5000);
                sheet.getRange(1, 3).setValue("=B2-C2");
                
                sheet.getRange(2, 0).setValue("Office Furniture");
                sheet.getRange(2, 1).setValue(12000);
                sheet.getRange(2, 2).setValue(2000);
                sheet.getRange(2, 3).setValue("=B3-C3");
                
                sheet.getRange(3, 0).setValue("Networking Gear");
                sheet.getRange(3, 1).setValue(18500);
                sheet.getRange(3, 2).setValue(3500);
                sheet.getRange(3, 3).setValue("=B4-C4");
                
                sheet.getRange(4, 0).setValue("Total Sum");
                sheet.getRange(4, 1).setValue("=SUM(B2:B4)");
                sheet.getRange(4, 2).setValue("=SUM(C2:C4)");
                sheet.getRange(4, 3).setValue("=SUM(D2:D4)");
                console.log("Preset 1: Financial Model loaded.");
            } 
            else if (id === 2) {
                // Atomics Cascading Stress
                sheet.getRange(0, 0).setValue("Cascade Link");
                sheet.getRange(0, 1).setValue("Thread Safe Value");
                
                sheet.getRange(1, 0).setValue("Initial Seed");
                sheet.getRange(1, 1).setValue(5);
                
                for (let i = 2; i < 16; i++) {
                    sheet.getRange(i, 0).setValue(`Atomic Link ${i-1}`);
                    sheet.getRange(i, 1).setValue(`=B${i}*2`); // Cascades: A_n * 2
                }
                console.log("Preset 2: Atomics Cascading loaded.");
            } 
            else if (id === 3) {
                // Vector Multiplication
                sheet.getRange(0, 0).setValue("Base Matrix");
                sheet.getRange(1, 0).setValue(100);
                sheet.getRange(2, 0).setValue(200);
                sheet.getRange(3, 0).setValue(300);
                sheet.getRange(4, 0).setValue(400);
                
                sheet.getRange(0, 1).setValue("Scale Factor");
                sheet.getRange(1, 1).setValue(1.5);
                
                sheet.getRange(0, 2).setValue("Vector Result");
                sheet.getRange(1, 2).setValue("=A2:A5*B2"); // Spill/Array Multiplication
                console.log("Preset 3: Vector spill loaded.");
            } 
            else if (id === 4) {
                // Nested-IF Refactoring
                sheet.getRange(0, 0).setValue("Score Grade");
                sheet.getRange(1, 0).setValue(95);
                sheet.getRange(2, 0).setValue(82);
                sheet.getRange(3, 0).setValue(65);
                
                sheet.getRange(0, 1).setValue("Result (IFS)");
                sheet.getRange(1, 1).setValue('=IFS(A2>=90, "Zenith", A2>=80, "Optimal", true, "Regular")');
                sheet.getRange(2, 1).setValue('=IFS(A3>=90, "Zenith", A3>=80, "Optimal", true, "Regular")');
                sheet.getRange(3, 1).setValue('=IFS(A4>=90, "Zenith", A4>=80, "Optimal", true, "Regular")');
                console.log("Preset 4: Nested IFS refactoring loaded.");
            }
        }

        // 2. SQL OLAP Query Execution using DuckDB over SQLite
        async function runSqlOlap() {
            const query = document.getElementById('sql-query-val').value.trim();
            const modal = document.getElementById('olap-modal');
            const modalBody = document.getElementById('modal-body-content');
            
            modal.classList.remove('hidden');
            modalBody.innerHTML = 'Executing SQL pivot query...';

            if (bridge) {
                try {
                    const rawRes = await bridge.RunOlapQuery(query);
                    const parts = rawRes.split('|');
                    const latency = parts[0];
                    const data = JSON.parse(parts[1]);

                    if (data.error) {
                        modalBody.innerHTML = `<span style="color:var(--danger-color)">Error: ${data.error}</span>`;
                        return;
                    }

                    // Build simple HTML table to display JSON results
                    let html = `<div class="text-[#0DA471] font-bold mb-2">Query speed: ${latency} ms</div>`;
                    html += `<table class="w-full text-left border-collapse">`;
                    
                    if (data.length > 0) {
                        const headers = Object.keys(data[0]);
                        html += `<tr class="border-b border-[#2e3037] text-white">`;
                        headers.forEach(h => html += `<th class="p-1">${h}</th>`);
                        html += `</tr>`;
                        
                        data.forEach(row => {
                            html += `<tr class="border-b border-[#23252a]">`;
                            headers.forEach(h => html += `<td class="p-1">${row[h]}</td>`);
                            html += `</tr>`;
                        });
                    } else {
                        html += `<tr><td>Empty result set.</td></tr>`;
                    }
                    html += `</table>`;
                    modalBody.innerHTML = html;

                } catch (err) {
                    modalBody.innerHTML = `<span class="text-[#ff003c]">Bridge failure: ${err.message}</span>`;
                }
            } else {
                // Emulation when browsing on GitHub Pages
                setTimeout(() => {
                    modalBody.innerHTML = `
                        <div class="text-[#0DA471] font-bold mb-2">Query speed: 0.043 ms (Mock)</div>
                        <table class="w-full text-left border-collapse">
                            <tr class="border-b border-[#2e3037] text-white">
                                <th class="p-1">category</th>
                                <th class="p-1">sum(price)</th>
                            </tr>
                            <tr class="border-b border-[#23252a]">
                                <td class="p-1">Hardware</td>
                                <td class="p-1">5,230.50</td>
                            </tr>
                            <tr class="border-b border-[#23252a]">
                                <td class="p-1">Electronics</td>
                                <td class="p-1">12,940.00</td>
                            </tr>
                        </table>
                    `;
                }, 150);
            }
        }

        function closeModal() {
            document.getElementById('olap-modal').classList.add('hidden');
        }

        // C++ Math Engine Reevaluation
        async function triggerRecalculate() {
            const t0 = performance.now();
            if (bridge) {
                try {
                    await bridge.RecalculateSheet(100, 20, 4);
                } catch (e) {}
            }
            const latency = (performance.now() - t0).toFixed(2);
            document.getElementById('evaluation-latency').textContent = `Puncalc Atomics: ${latency}ms`;
        }

        // Direct Zebra Tag Printer
        async function directPrint() {
            const val = prompt("Enter tag/barcode number to print via Zebra:", "(8004)109283749");
            if (!val) return;
            if (bridge) {
                try {
                    const res = await bridge.PrintGiai(val, "");
                    alert(`Label Printed successfully: ${res}`);
                } catch (e) {
                    alert(`Print error: ${e.message}`);
                }
            } else {
                alert(`[Offline Mock] Printed tag: ${val}`);
            }
        }

        // Export data
        function exportData(format) {
            try {
                const snapshot = workbook.save();
                const cellData = (snapshot && snapshot.sheets && snapshot.sheets.sheet1) ? snapshot.sheets.sheet1.cellData : defaultCellData;
                
                let content = "";
                let mime = "";
                let extension = "";

                if (format === 'json') {
                    content = JSON.stringify(cellData, null, 4);
                    mime = "application/json";
                    extension = "json";
                } else if (format === 'csv') {
                    let csvRows = [];
                    for (let r = 0; r < 20; r++) {
                        let row = [];
                        for (let c = 0; c < 10; c++) {
                            const val = (cellData[r] && cellData[r][c]) ? cellData[r][c].v : "";
                            row.push(`"${String(val).replace(/"/g, '""')}"`);
                        }
                        csvRows.push(row.join(","));
                    }
                    content = csvRows.join("\n");
                    mime = "text/csv";
                    extension = "csv";
                }

                const blob = new Blob([content], { type: mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `sovereign_grid_export_${Date.now()}.${extension}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                alert(`Export failed: ${err.message}`);
            }
        }

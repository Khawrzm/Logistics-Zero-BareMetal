<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SovereignGrid • Open Source Local Spreadsheet</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- UniverJS Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/design@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/ui@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-ui@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-numfmt@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-find-replace@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/docs-ui@0.2.0/lib/index.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@univerjs/sheets-conditional-formatting@0.2.0/lib/index.css">

    <style>
        :root {
            --bg-color: #131417;
            --panel-color: #1b1c1f;
            --border-color: #2e3037;
            --text-color: #e3e4e6;
            --text-muted: #8a8d98;
            --accent-color: #0DA471;
            --accent-glow: rgba(13, 164, 113, 0.15);
            --danger-color: #ff003c;
            --warning-color: #ffb700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-color);
            border-bottom: 1px solid var(--border-color);
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-color);
        }

        .title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .actions-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            background-color: #25272d;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            border-color: var(--accent-color);
            background-color: rgba(13, 164, 119, 0.08);
            color: var(--accent-color);
        }

        .btn-accent {
            background: linear-gradient(135deg, var(--accent-color), #097d56);
            border: none;
        }

        .btn-accent:hover {
            background: linear-gradient(135deg, #10cf8e, var(--accent-color));
            box-shadow: 0 0 10px rgba(13, 164, 113, 0.25);
            color: #fff;
        }

        .sql-input-group {
            display: flex;
            align-items: center;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2px 6px;
            margin-right: 8px;
        }

        .sql-input {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            width: 280px;
            outline: none;
            padding: 4px;
        }

        /* Full screen UniverJS Container */
        .workspace {
            flex: 1;
            display: flex;
            min-height: 0;
            position: relative;
        }

        #univer-container {
            width: 100%;
            height: 100%;
        }

        /* Overlay modal for SQL results */
        #olap-modal {
            display: none;
            position: absolute;
            bottom: 35px;
            right: 20px;
            width: 480px;
            max-height: 280px;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-color);
            background-color: #16171a;
        }

        .modal-body {
            padding: 12px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #b5b7c0;
            flex: 1;
        }

        footer {
            height: 28px;
            background-color: var(--panel-color);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Header Navbar -->
    <header>
        <div class="logo-section">
            <div class="status-dot"></div>
            <span class="title" id="title-text">SovereignGrid</span>
            <span style="font-size: 10px; color: var(--text-muted); border: 1px solid var(--border-color); padding: 1px 6px; border-radius: 10px;" id="badge-mode">LOCAL ENCLAVE</span>
        </div>

        <div class="actions-bar">
            <!-- DuckDB SQL OLAP Input -->
            <div class="sql-input-group">
                <span style="font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent-color); font-weight: bold; padding-left: 4px;">SQL></span>
                <input type="text" id="sql-query-val" class="sql-input" value="SELECT category, SUM(price) FROM inventory_items GROUP BY category" />
                <button class="btn" style="padding: 2px 8px; border: none; background: transparent; color: var(--accent-color);" onclick="runSqlOlap()" id="sql-run-btn">Run Query</button>
            </div>

            <button class="btn btn-accent" onclick="triggerRecalculate()" id="btn-recalc">Run C++20 Atomics</button>
            <button class="btn" onclick="directPrint()" id="btn-print">Print GIAI Tag</button>
            
            <div style="width: 1px; height: 16px; background-color: var(--border-color); margin: 0 4px;"></div>
            
            <button class="btn" onclick="exportData('csv')">CSV</button>
            <button class="btn" onclick="exportData('json')">JSON</button>
            <button class="btn" onclick="toggleLanguage()" id="btn-lang" style="padding: 6px 10px;">عربي</button>
        </div>
    </header>

    <!-- Workspace Sheet -->
    <div class="workspace">
        <div id="univer-container"></div>

        <!-- SQL OLAP modal popup -->
        <div id="olap-modal">
            <div class="modal-header">
                <span style="font-size: 11px; font-weight: 600; color: var(--accent-color);" id="modal-title">DuckDB Columnar Query Results</span>
                <button onclick="closeModal()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:14px;">&times;</button>
            </div>
            <div class="modal-body" id="modal-body-content">
                No query executed.
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div id="footer-left">SovereignGrid • Open-Source Offline Engine</div>
        <div id="evaluation-latency" style="color: var(--accent-color)">Puncalc Atomics: 0.00ms</div>
        <div id="footer-right">100,000+ Row Canvas2D Grid</div>
    </footer>

    <!-- UniverJS Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/core@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/design@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/engine-render@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/engine-formula@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/ui@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/docs@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/docs-ui@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-ui@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-formula@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-numfmt@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-find-replace@0.2.0/lib/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@univerjs/sheets-conditional-formatting@0.2.0/lib/umd/index.js"></script>

    <script>
        let bridge;
        try {
            if (window.chrome && window.chrome.webview && window.chrome.webview.hostObjects) {
                bridge = window.chrome.webview.hostObjects.bridge;
            }
        } catch (e) {
            console.warn("WebView2 Host Object Bridge not available. Emulating offline.", e);
        }

        // Configure default theme and override colors to match accent green
        const defaultTheme = UniverDesign.themes.dark;
        defaultTheme.green500 = '#0DA471';
        defaultTheme.primaryColor = '#0DA471';
        defaultTheme.bgNormalColor = '#1B1C1F';
        defaultTheme.bgBodyColor = '#1B1C1F';

        // 1. Initialize UniverJS core engine
        const univer = new UniverCore.Univer({
            theme: defaultTheme,
            darkMode: true
        });

        // Register core & UI plugins
        univer.registerPlugin(UniverRender.UniverRenderEnginePlugin);
        univer.registerPlugin(UniverUI.UniverUIPlugin, {
            container: 'univer-container',
            header: true,
            footer: true,
            sidebar: false,
        });
        univer.registerPlugin(UniverDocs.UniverDocsPlugin);
        univer.registerPlugin(UniverDocsUI.UniverDocsUIPlugin);
        univer.registerPlugin(UniverSheets.UniverSheetsPlugin);
        univer.registerPlugin(UniverSheetsUI.UniverSheetsUIPlugin);
        univer.registerPlugin(UniverSheetsFormula.UniverSheetsFormulaPlugin);
        univer.registerPlugin(UniverSheetsNumfmt.UniverSheetsNumfmtPlugin);
        univer.registerPlugin(UniverSheetsFindReplace.UniverSheetsFindReplacePlugin);
        univer.registerPlugin(UniverSheetsConditionalFormatting.UniverSheetsConditionalFormattingPlugin);

        // Load cached spreadsheet data from localStorage if exists
        let loadedCellData = null;
        try {
            const cached = localStorage.getItem('sovereign_grid_cells');
            if (cached) loadedCellData = JSON.parse(cached);
        } catch (err) {}

        const defaultCellData = {
            '0': {
                '0': { v: 'Column A (Raw Values)' },
                '1': { v: 'Column B (Calculations)' },
                '2': { v: 'Column C (Conditionals)' }
            },
            '1': {
                '0': { v: 1500 },
                '1': { v: '=SUM(A2:A5)' },
                '2': { v: '=IFS(A2>2000, "High", A2>1000, "Medium", true, "Low")' }
            },
            '2': { '0': { v: 2200 } },
            '3': { '0': { v: 950 } },
            '4': { '0': { v: 1300 } }
        };

        // Create workbook instance
        const workbook = univer.createUniverSheet({
            id: 'sovereign_workbook',
            name: 'Sheet1',
            sheetOrder: ['sheet1'],
            sheets: {
                sheet1: {
                    id: 'sheet1',
                    name: 'Grid Data',
                    rowCount: 100000,
                    columnCount: 26,
                    cellData: loadedCellData || defaultCellData
                }
            }
        });

        // Auto-save logic (Local Storage)
        setInterval(() => {
            try {
                const snapshot = workbook.save();
                if (snapshot && snapshot.sheets && snapshot.sheets.sheet1 && snapshot.sheets.sheet1.cellData) {
                    localStorage.setItem('sovereign_grid_cells', JSON.stringify(snapshot.sheets.sheet1.cellData));
                }
            } catch (err) {}
        }, 15000);

        // 2. SQL OLAP Query Execution using DuckDB over SQLite
        async function runSqlOlap() {
            const query = document.getElementById('sql-query-val').value.trim();
            const modal = document.getElementById('olap-modal');
            const modalBody = document.getElementById('modal-body-content');
            
            modal.style.display = 'flex';
            modalBody.innerHTML = 'Executing SQL pivot query...';

            if (bridge) {
                try {
                    const rawRes = await bridge.RunOlapQuery(query);
                    const parts = rawRes.split('|');
                    const latency = parts[0];
                    const data = JSON.parse(parts[1]);

                    if (data.error) {
                        modalBody.innerHTML = `<span style="color:var(--danger-color)">Error: ${data.error}</span>`;
                        return;
                    }

                    // Build simple HTML table to display JSON results
                    let html = `<div style="color:var(--accent-color); font-weight:bold; margin-bottom:8px;">Query speed: ${latency} ms</div>`;
                    html += `<table style="width:100%; border-collapse:collapse; text-align:left;">`;
                    
                    if (data.length > 0) {
                        const headers = Object.keys(data[0]);
                        html += `<tr style="border-bottom:1px solid var(--border-color); color:#fff;">`;
                        headers.forEach(h => html += `<th style="padding:4px;">${h}</th>`);
                        html += `</tr>`;
                        
                        data.forEach(row => {
                            html += `<tr style="border-bottom:1px solid #23252a;">`;
                            headers.forEach(h => html += `<td style="padding:4px;">${row[h]}</td>`);
                            html += `</tr>`;
                        });
                    } else {
                        html += `<tr><td>Empty result set.</td></tr>`;
                    }
                    html += `</table>`;
                    modalBody.innerHTML = html;

                } catch (err) {
                    modalBody.innerHTML = `<span style="color:var(--danger-color)">Bridge failure: ${err.message}</span>`;
                }
            } else {
                // Emulation when browsing on GitHub Pages
                setTimeout(() => {
                    modalBody.innerHTML = `
                        <div style="color:var(--accent-color); font-weight:bold; margin-bottom:8px;">Query speed: 0.043 ms (Mock)</div>
                        <table style="width:100%; border-collapse:collapse; text-align:left;">
                            <tr style="border-bottom:1px solid var(--border-color); color:#fff;">
                                <th style="padding:4px;">category</th>
                                <th style="padding:4px;">sum(price)</th>
                            </tr>
                            <tr style="border-bottom:1px solid #23252a;">
                                <td style="padding:4px;">Hardware</td>
                                <td style="padding:4px;">5,230.50</td>
                            </tr>
                            <tr style="border-bottom:1px solid #23252a;">
                                <td style="padding:4px;">Electronics</td>
                                <td style="padding:4px;">12,940.00</td>
                            </tr>
                        </table>
                    `;
                }, 150);
            }
        }

        function closeModal() {
            document.getElementById('olap-modal').style.display = 'none';
        }

        // C++ Math Engine Reevaluation
        async function triggerRecalculate() {
            const t0 = performance.now();
            if (bridge) {
                try {
                    await bridge.RecalculateSheet(100, 20, 4);
                } catch (e) {}
            }
            const latency = (performance.now() - t0).toFixed(2);
            document.getElementById('evaluation-latency').textContent = `Puncalc Atomics: ${latency}ms`;
        }

        // Direct Zebra Tag Printer
        async function directPrint() {
            const val = prompt("Enter tag/barcode number to print via Zebra:", "(8004)109283749");
            if (!val) return;
            if (bridge) {
                try {
                    const res = await bridge.PrintGiai(val, "");
                    alert(`Label Printed successfully: ${res}`);
                } catch (e) {
                    alert(`Print error: ${e.message}`);
                }
            } else {
                alert(`[Offline Mock] Printed tag: ${val}`);
            }
        }

        // Export data
        function exportData(format) {
            try {
                const snapshot = workbook.save();
                const cellData = (snapshot && snapshot.sheets && snapshot.sheets.sheet1) ? snapshot.sheets.sheet1.cellData : defaultCellData;
                
                let content = "";
                let mime = "";
                let extension = "";

                if (format === 'json') {
                    content = JSON.stringify(cellData, null, 4);
                    mime = "application/json";
                    extension = "json";
                } else if (format === 'csv') {
                    let csvRows = [];
                    for (let r = 0; r < 20; r++) {
                        let row = [];
                        for (let c = 0; c < 10; c++) {
                            const val = (cellData[r] && cellData[r][c]) ? cellData[r][c].v : "";
                            row.push(`"${String(val).replace(/"/g, '""')}"`);
                        }
                        csvRows.push(row.join(","));
                    }
                    content = csvRows.join("\n");
                    mime = "text/csv";
                    extension = "csv";
                }

                const blob = new Blob([content], { type: mime });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `sovereign_grid_export_${Date.now()}.${extension}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (err) {
                alert(`Export failed: ${err.message}`);
            }
        }

        // Bilingual Mode
        let isArabic = false;
        const translations = {
            en: {
                title: "SovereignGrid",
                badge: "LOCAL ENCLAVE",
                recalc: "Run C++20 Atomics",
                print: "Print GIAI Tag",
                runBtn: "Run Query",
                footerLeft: "SovereignGrid • Open-Source Offline Engine",
                langBtn: "عربي"
            },
            ar: {
                title: "الشبكة المستقلة",
                badge: "منطقة معزولة محلياً",
                recalc: "تشغيل محرك C++20",
                print: "طباعة ملصق GIAI",
                runBtn: "نفّذ الاستعلام",
                footerLeft: "SovereignGrid • محرك محلي مفتوح المصدر",
                langBtn: "English"
            }
        };

        function toggleLanguage() {
            isArabic = !isArabic;
            const lang = isArabic ? 'ar' : 'en';
            document.body.dir = isArabic ? 'rtl' : 'ltr';
            
            document.getElementById('title-text').textContent = translations[lang].title;
            document.getElementById('badge-mode').textContent = translations[lang].badge;
            document.getElementById('btn-recalc').textContent = translations[lang].recalc;
            document.getElementById('btn-print').textContent = translations[lang].print;
            document.getElementById('sql-run-btn').textContent = translations[lang].runBtn;
            document.getElementById('footer-left').textContent = translations[lang].footerLeft;
            document.getElementById('btn-lang').textContent = translations[lang].langBtn;
        }
    </script>
</body>
</html>
